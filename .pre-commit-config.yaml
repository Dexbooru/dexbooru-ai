repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest test/ -v
        language: system
        pass_filenames: false

      - id: push-models-to-s3
        name: push ML models to S3 (metadata staged)
        entry: ./scripts/push-models-to-s3.sh --staged
        language: system
        pass_filenames: false
        files: ^models/metadata/.*\.meta\.json$
